<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>2D Grondplan Teken App – Fase 1</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar hidden" id="topbar">
      <div class="dimension-group">
        <input id="widthInput" type="number" min="1" value="400" />
        <span id="widthUnit">cm</span>
      </div>
      <span class="times">x</span>
      <div class="dimension-group">
        <input id="heightInput" type="number" min="1" value="400" />
        <span id="heightUnit">cm</span>
      </div>
      <div class="topbar-spacer"></div>
      <button id="applyDimensionsBtn" class="primary-btn">Pas afmetingen toe</button>
    </header>

    <main class="workspace">
      <section class="canvas-panel">
        <div class="canvas-stage" id="canvasStage">
          <svg id="planCanvas" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" aria-label="Tekenveld">
            <defs>
              <pattern id="smallGrid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" class="grid-line-small" />
              </pattern>
              <pattern id="largeGrid" width="200" height="200" patternUnits="userSpaceOnUse">
                <rect width="200" height="200" fill="url(#smallGrid)" />
                <path d="M 200 0 L 0 0 0 200" fill="none" class="grid-line-large" />
              </pattern>
            </defs>

            <g id="viewportLayer">
              <rect width="1200" height="900" fill="url(#largeGrid)" />
              <g id="guideLayer"></g>
              <g id="shapeLayer"></g>
              <g id="selectionLayer"></g>
            </g>
          </svg>
        </div>
      </section>

      <aside class="right-toolbar" aria-label="Tools">
        <button class="tool-btn" data-tool="line">
          <span class="tool-icon line-icon"></span>
          <span class="tool-label">Lijn</span>
        </button>
        <button class="tool-btn active" data-tool="square">
          <span class="tool-icon square-icon"></span>
          <span class="tool-label">Vierkant</span>
        </button>
        <button class="tool-btn" data-tool="door">
          <span class="tool-icon door-icon"></span>
          <span class="tool-label">Deur</span>
        </button>
        <button class="tool-btn" data-tool="double-door">
          <span class="tool-icon double-door-icon"></span>
          <span class="tool-label">Dubbeldeur</span>
        </button>
        <button class="tool-btn" data-tool="garage">
          <span class="tool-icon garage-icon"></span>
          <span class="tool-label">Garagepoort</span>
        </button>
        <button class="tool-btn" data-tool="window">
          <span class="tool-icon window-icon"></span>
          <span class="tool-label">Raam</span>
        </button>
        <button class="tool-btn" data-tool="opening">
          <span class="tool-icon opening-icon"></span>
          <span class="tool-label">Opening</span>
        </button>
        <button class="tool-btn" data-tool="note">
          <span class="tool-icon note-icon"></span>
          <span class="tool-label">Opmerking</span>
        </button>
      </aside>
    </main>

    <footer>
      <div class="actionbar secondary-bar">
        <button class="action-btn" id="deleteBtn">Verwijder</button>
        <button class="action-btn" id="duplicateBtn">Dupliceer</button>
      </div>
      <div class="actionbar primary-bar">
        <button class="action-btn" id="undoBtn">Ongedaan maken</button>
        <button class="action-btn" id="redoBtn">Opnieuw</button>
        <button class="action-btn" id="saveBtn">Opslaan</button>
        <button class="action-btn" id="exportBtn">Export</button>
        <button class="action-btn" id="settingsBtn">Instellingen</button>
      </div>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
